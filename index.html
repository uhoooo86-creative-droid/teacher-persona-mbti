<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 티칭 페르소나 진단기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8F0;
    --blush: #FFCDD2;
    --rose: #F48FB1;
    --peach: #FFCCBC;
    --lavender: #E1BEE7;
    --mint: #B2EBF2;
    --sage: #C8E6C9;
    --yellow: #FFF9C4;
    --text-dark: #3E2723;
    --text-mid: #5D4037;
    --text-light: #8D6E63;
    --card-shadow: 0 8px 32px rgba(180,100,100,0.10);
    --border-radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #FFF0F5 0%, #FFF8F0 40%, #F0F8FF 100%);
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-dark);
  }

  /* SPLASH */
  #splash {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px; text-align: center;
    animation: fadeIn 0.8s ease;
  }
  .splash-deco {
    font-size: 56px; margin-bottom: 16px; animation: bounce 2s infinite;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .splash-title {
    font-family: 'Gowun Batang', serif;
    font-size: clamp(24px, 6vw, 40px);
    color: var(--text-dark);
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .splash-sub {
    font-size: 15px; color: var(--text-light); margin-bottom: 40px; line-height: 1.7;
  }
  .tag-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
  .tag {
    padding: 6px 16px; border-radius: 30px; font-size: 13px; font-weight: 500;
    border: 1.5px solid rgba(0,0,0,0.08);
  }
  .tag-pink { background: #FFE4EE; color: #C2185B; }
  .tag-mint { background: #E0F7FA; color: #00838F; }
  .tag-lav  { background: #EDE7F6; color: #6A1B9A; }
  .tag-peach { background: #FFF3E0; color: #E65100; }
  .tag-sage  { background: #F1F8E9; color: #2E7D32; }
  .btn-start {
    background: linear-gradient(135deg, #F48FB1, #CE93D8);
    color: white; border: none; border-radius: 50px;
    padding: 18px 56px; font-size: 18px; font-weight: 700;
    cursor: pointer; box-shadow: 0 6px 24px rgba(244,143,177,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-start:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(244,143,177,0.5); }
  .splash-note { margin-top: 20px; font-size: 13px; color: #B0A0A0; }

  /* QUIZ */
  #quiz { display: none; max-width: 680px; margin: 0 auto; padding: 30px 20px; animation: fadeIn 0.5s ease; }
  .progress-wrap { margin-bottom: 28px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
  .progress-bar-bg { background: #F3E5F5; border-radius: 10px; height: 10px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, #F48FB1, #CE93D8);
    border-radius: 10px; transition: width 0.4s ease;
  }
  .page-title {
    font-family: 'Gowun Batang', serif;
    font-size: 20px; color: var(--text-mid); margin-bottom: 24px; text-align: center;
  }
  .question-card {
    background: white; border-radius: var(--border-radius);
    padding: 24px; margin-bottom: 18px;
    box-shadow: var(--card-shadow); border: 1.5px solid #FFF0F5;
    animation: fadeIn 0.4s ease;
  }
  .q-num { font-size: 11px; font-weight: 700; color: #F06292; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .q-text { font-size: 15px; line-height: 1.7; color: var(--text-dark); margin-bottom: 18px; }
  .scale-row { display: flex; align-items: center; gap: 0; }
  .scale-label { font-size: 11px; color: var(--text-light); width: 80px; line-height: 1.3; }
  .scale-label:last-child { text-align: right; }
  .scale-btns { display: flex; gap: 8px; flex: 1; justify-content: center; }
  .scale-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid #F3E5F5; background: white;
    cursor: pointer; font-size: 12px; font-weight: 700;
    color: #BDBDBD; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .scale-btn:hover { border-color: #F48FB1; color: #F48FB1; transform: scale(1.1); }
  .scale-btn.selected {
    background: linear-gradient(135deg, #F48FB1, #CE93D8);
    border-color: transparent; color: white;
    box-shadow: 0 3px 10px rgba(244,143,177,0.4);
    transform: scale(1.15);
  }
  .quiz-nav { display: flex; gap: 12px; justify-content: center; margin-top: 28px; }
  .btn-nav {
    padding: 14px 36px; border-radius: 50px; border: none;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
  }
  .btn-prev { background: #F5F5F5; color: var(--text-light); }
  .btn-prev:hover { background: #EEE; }
  .btn-next {
    background: linear-gradient(135deg, #F48FB1, #CE93D8);
    color: white; box-shadow: 0 4px 16px rgba(244,143,177,0.4);
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(244,143,177,0.5); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* RESULT */
  #result { display: none; max-width: 800px; margin: 0 auto; padding: 30px 20px; animation: fadeIn 0.6s ease; }
  .result-header { text-align: center; margin-bottom: 40px; }
  .result-emoji { font-size: 64px; margin-bottom: 16px; }
  .result-mbti {
    font-family: 'Gowun Batang', serif;
    font-size: clamp(36px, 10vw, 60px);
    background: linear-gradient(135deg, #F48FB1, #CE93D8, #80DEEA);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 8px; margin-bottom: 8px;
  }
  .result-type-name {
    font-size: 20px; font-weight: 700; color: var(--text-dark); margin-bottom: 12px;
  }
  .result-comment {
    font-size: 15px; color: var(--text-mid); line-height: 1.8;
    background: linear-gradient(135deg, #FFF0F5, #F3E5F5);
    border-radius: 16px; padding: 20px 24px; margin-bottom: 32px;
    border-left: 4px solid #F48FB1;
  }

  /* PERSONA CARD */
  .section-title {
    font-family: 'Gowun Batang', serif;
    font-size: 22px; color: var(--text-dark); margin-bottom: 20px; text-align: center;
  }
  .persona-card {
    border-radius: 24px; padding: 28px 24px; margin-bottom: 32px;
    position: relative; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.10);
  }
  .persona-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; padding: 5px 14px; border-radius: 30px;
    margin-bottom: 16px; background: rgba(255,255,255,0.6); color: var(--text-mid);
  }
  .persona-emoji { font-size: 48px; margin-bottom: 12px; display: block; }
  .persona-name { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .persona-desc { font-size: 14px; line-height: 1.8; opacity: 0.85; }
  .persona-traits { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .persona-trait { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: rgba(255,255,255,0.5); }

  /* ROUTINE TABLE */
  .routine-wrap { margin-bottom: 32px; overflow-x: auto; }
  .routine-table {
    width: 100%; border-collapse: collapse;
    font-size: 13px; border-radius: 20px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    min-width: 540px;
  }
  .routine-table th {
    padding: 14px 12px; font-weight: 700; font-size: 12px;
    text-align: center; letter-spacing: 0.5px;
  }
  .routine-table th.stage-header {
    background: linear-gradient(135deg, #F48FB1, #CE93D8);
    color: white; width: 110px;
  }
  .routine-table th.persona-col { background: #FFF0F5; color: var(--text-mid); }
  .routine-table td {
    padding: 13px 14px; border-bottom: 1px solid #FFF0F5;
    vertical-align: top; line-height: 1.6; text-align: center;
    font-size: 13px;
  }
  .routine-table td.stage-cell {
    font-weight: 700; font-size: 12px; background: #FFF8FF;
    color: var(--text-mid); text-align: center; vertical-align: middle;
  }
  .routine-table tr:last-child td { border-bottom: none; }
  .routine-table tr:nth-child(even) td { background: #FFFBFF; }
  .highlight-col { background: #FFF0F5 !important; font-weight: 600; color: #C2185B; }
  .stage-icon { font-size: 16px; display: block; margin-bottom: 2px; }

  /* TIPS */
  .tips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 32px; }
  @media(max-width:540px) { .tips-grid { grid-template-columns: 1fr; } }
  .tip-card {
    background: white; border-radius: 16px; padding: 18px 16px;
    box-shadow: var(--card-shadow); border-top: 3px solid;
  }
  .tip-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .tip-card p { font-size: 12px; color: var(--text-light); line-height: 1.7; }

  .btn-retry {
    display: block; width: 100%; max-width: 320px; margin: 10px auto 0;
    padding: 16px; border-radius: 50px; border: 2px solid #F48FB1;
    background: white; color: #F48FB1; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-retry:hover { background: #FFF0F5; }

  @media(max-width:480px) {
    .scale-label { width: 60px; font-size: 10px; }
    .scale-btn { width: 30px; height: 30px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-deco">🌸</div>
  <h1 class="splash-title">나의 티칭 페르소나<br>&amp; 수업 루틴 진단기</h1>
  <p class="splash-sub">나는 어떤 강사일까요?<br>30개 문항으로 나의 티칭 스타일과 맞춤 수업 루틴을 알아보세요!</p>
  <div class="tag-row">
    <span class="tag tag-pink">💄 예쁨주의</span>
    <span class="tag tag-mint">😄 유머주의</span>
    <span class="tag tag-lav">🌿 소심함주의</span>
    <span class="tag tag-peach">💛 공감주의</span>
    <span class="tag tag-sage">📚 교육주의</span>
  </div>
  <button class="btn-start" onclick="startQuiz()">진단 시작하기 ✨</button>
  <p class="splash-note">소요 시간 약 5분 · 총 30문항 · 5점 척도</p>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">1 / 6 페이지</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <p class="page-title" id="page-title">📝 수업 준비 & 계획 스타일</p>
  <div id="questions-container"></div>
  <div class="quiz-nav">
    <button class="btn-nav btn-prev" id="btn-prev" onclick="prevPage()" style="display:none">← 이전</button>
    <button class="btn-nav btn-next" id="btn-next" onclick="nextPage()">다음 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result"></div>

<script>

// STATE

let currentPage = 0;
let answers = {};

function startQuiz() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderPage();
}

function renderPage() {
  const indices = PAGES[currentPage];
  document.getElementById('page-title').textContent = PAGE_TITLES[currentPage];
  const pct = Math.round((currentPage / PAGES.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentPage+1} / ${PAGES.length} 페이지`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('btn-prev').style.display = currentPage > 0 ? 'block' : 'none';

  const isLast = currentPage === PAGES.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '결과 보기 🌸' : '다음 →';

  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  indices.forEach((qi, i) => {
    const q = QUESTIONS[qi];
    const saved = answers[q.id] || null;
    const card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = `
      <div class="q-num">Q${q.id}</div>
      <div class="q-text">${q.text}</div>
      <div class="scale-row">
        <div class="scale-label">${q.la}</div>
        <div class="scale-btns" id="btns-${q.id}">
          ${[1,2,3,4,5].map(v=>`<button class="scale-btn${saved===v?' selected':''}" onclick="selectAnswer(${q.id},${v},this)">${v}</button>`).join('')}
        </div>
        <div class="scale-label">${q.lb}</div>
      </div>
    `;
    container.appendChild(card);
  });
  updateNextBtn();
}

function selectAnswer(qid, val, btn) {
  answers[qid] = val;
  const btns = document.querySelectorAll(`#btns-${qid} .scale-btn`);
  btns.forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updateNextBtn();
}

function updateNextBtn() {
  const indices = PAGES[currentPage];
  const allAnswered = indices.every(qi => answers[QUESTIONS[qi].id]);
  document.getElementById('btn-next').disabled = !allAnswered;
}

function nextPage() {
  if (currentPage < PAGES.length - 1) {
    currentPage++;
    renderPage();
    window.scrollTo(0,0);
  } else {
    showResult();
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderPage();
    window.scrollTo(0,0);
  }
}

// ============================================================
// SCORING
// ============================================================
function calcMBTI() {
  let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
  let counts = { EI: 0, SN: 0, TF: 0, JP: 0 };

  QUESTIONS.forEach(q => {
    const val = answers[q.id];
    if (!val) return;
    counts[q.dim]++;
    if (q.dir === 'E' || q.dir === 'S' || q.dir === 'T' || q.dir === 'J') {
      scores[q.dim] += val;
    } else {
      scores[q.dim] += (6 - val); // reverse for I,N,F,P
    }
  });

  const avg = dim => counts[dim] ? scores[dim] / counts[dim] : 3;
  const e = avg('EI') > 3 ? 'E' : 'I';
  const s = avg('SN') > 3 ? 'S' : 'N';
  const t = avg('TF') > 3 ? 'T' : 'F';
  const j = avg('JP') > 3 ? 'J' : 'P';
  return { mbti: e+s+t+j, raw: { EI: avg('EI'), SN: avg('SN'), TF: avg('TF'), JP: avg('JP') } };
}

function getPersona(mbti) {
  for (const [key, p] of Object.entries(PERSONAS)) {
    if (p.cond(mbti)) return { key, ...p };
  }
  // fallback
  if (mbti.includes('T') && mbti.includes('J')) return { key:'교육주의', ...PERSONAS['교육주의'] };
  if (mbti.includes('F') && mbti.includes('N')) return { key:'공감주의', ...PERSONAS['공감주의'] };
  if (mbti.includes('E')) return { key:'유머주의', ...PERSONAS['유머주의'] };
  return { key:'소심함주의', ...PERSONAS['소심함주의'] };
}
